{% extends "base.html" %}
{% block title %}Sign In — Toy OAuth Server{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Sign In</h2>
                <form action="/signuserin" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="password" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                        <a href="/index" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
                <hr>
                <p class="mb-0 text-muted small">Don't have an account? <a href="/register">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
