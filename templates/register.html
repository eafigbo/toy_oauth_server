{% extends "base.html" %}
{% block title %}Register — Toy OAuth Server{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Create an Account</h2>
                <form id="register_form" action="/registeruser" method="POST" novalidate>
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" class="form-control" name="first_name" id="first_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" class="form-control" name="last_name" id="last_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="home_address" class="form-label">Home Address</label>
                        <textarea class="form-control" name="home_address" id="home_address" rows="2" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="password" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" name="confirm_password" id="confirm_password" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" onclick="confirmAndSubmit()">Register</button>
                        <a href="/index" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
function confirmAndSubmit() {
    const form = document.getElementById('register_form');
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    confirm.setCustomValidity('');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    if (password.value !== confirm.value) {
        confirm.setCustomValidity('Passwords do not match');
        confirm.reportValidity();
        return;
    }
    form.submit();
}
document.getElementById('confirm_password').addEventListener('input', function () {
    this.setCustomValidity('');
});
</script>
{% endblock %}
