{% extends "base.html" %}
{% block title %}Add Application — Toy OAuth Server{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Register a New Application</h2>
                <form action="/save_application" method="POST">
                    <div class="mb-3">
                        <label for="application_name" class="form-label">Application Name</label>
                        <input type="text" class="form-control" name="application_name" id="application_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" name="description" id="description" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="redirect_url" class="form-label">Redirect URL</label>
                        <input type="url" class="form-control" name="redirect_url" id="redirect_url" required>
                    </div>
                    <div class="mb-3">
                        <label for="icon_url" class="form-label">Icon URL <span class="text-muted small">(optional)</span></label>
                        <input type="url" class="form-control" name="icon_url" id="icon_url">
                    </div>
                    <div class="mb-3">
                        <label for="home_page_url" class="form-label">Home Page URL <span class="text-muted small">(optional)</span></label>
                        <input type="url" class="form-control" name="home_page_url" id="home_page_url">
                    </div>
                    <div class="mb-4">
                        <label for="privacy_policy_url" class="form-label">Privacy Policy URL <span class="text-muted small">(optional)</span></label>
                        <input type="url" class="form-control" name="privacy_policy_url" id="privacy_policy_url">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Create Application</button>
                        <a href="/profile" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
