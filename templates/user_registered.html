{% extends "base.html" %}
{% block title %}Registration Successful — Toy OAuth Server{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="alert alert-success">
            <h4 class="alert-heading">Registration Successful!</h4>
            <p class="mb-0">Welcome, <strong>{{ user.first_name }} {{ user.last_name }}</strong>. Your account has been created.</p>
        </div>
        <a href="/signin" class="btn btn-primary">Sign In</a>
        <a href="/index" class="btn btn-outline-secondary ms-2">Home</a>
    </div>
</div>
{% endblock %}
