{% extends "base.html" %}
{% block title %}{{ 'Edit User' if user else 'New User' }} — Admin{% endblock %}
{% block content %}
<div class="mb-3">
    <a href="/admin/users" class="text-muted text-decoration-none small">Admin / Users</a>
    <span class="text-muted small"> / {{ 'Edit' if user else 'New' }}</span>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">{{ 'Edit User' if user else 'New User' }}</h3>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{{ action }}">
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" class="form-control" name="first_name" id="first_name"
                               value="{{ user.first_name if user else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" class="form-control" name="last_name" id="last_name"
                               value="{{ user.last_name if user else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email"
                               value="{{ user.email if user else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Address <span class="text-muted small">(optional)</span></label>
                        <input type="text" class="form-control" name="address" id="address"
                               value="{{ user.address if user else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            Password
                            {% if user %}<span class="text-muted small">(leave blank to keep current)</span>{% endif %}
                        </label>
                        <input type="password" class="form-control" name="password" id="password"
                               {{ 'required' if not user }}>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" name="is_admin" id="is_admin"
                               {{ 'checked' if user and user.is_admin }}>
                        <label class="form-check-label" for="is_admin">Admin</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            {{ 'Save Changes' if user else 'Create User' }}
                        </button>
                        <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
